apiVersion: v1
kind: Pod
metadata: 
  name: mynginx
  labels:
    app: web
spec:
  containers:
  - name: nginx-container
    image: nginx:latest
    ports:
      - containerPort: 80
    volumeMounts:
    - name: host-data
      mountPath: /usr/share/nginx/html

  volumes:
  - name: host-data
    hostPath:
      path: /data/nginx
      type: DirectoryOrCreate
